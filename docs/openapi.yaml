openapi: 3.0.3
info:
  title: API Gateway
  description: A feature-rich API Gateway built with Go
  version: 1.0.0
  contact:
    name: MuratZrl
    url: https://github.com/MuratZrl/api-gateway

servers:
  - url: http://localhost:8080
    description: Local development

paths:
  /health:
    get:
      summary: Health check
      tags: [System]
      responses:
        "200":
          description: Gateway is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: "1.0.0"

  /metrics:
    get:
      summary: Prometheus metrics
      tags: [System]
      responses:
        "200":
          description: Prometheus metrics in text format

  /api/users:
    get:
      summary: List all users
      tags: [Users]
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
    post:
      summary: Create a new user
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email]
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                  example: Ali Yilmaz
                email:
                  type: string
                  minLength: 5
                  maxLength: 255
                  example: ali@example.com
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

  /api/products:
    get:
      summary: List all products
      tags: [Products]
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
    post:
      summary: Create a new product
      tags: [Products]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, price]
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 200
                  example: Laptop
                price:
                  type: number
                  minimum: 0
                  maximum: 1000000
                  example: 25999.99
                stock:
                  type: integer
                  example: 50
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          $ref: "#/components/responses/ValidationError"

  /admin/routes:
    get:
      summary: List all routes
      tags: [Admin]
      responses:
        "200":
          description: List of routes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Route"
    post:
      summary: Create a new route
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path, target, methods]
              properties:
                path:
                  type: string
                  example: /api/orders
                target:
                  type: string
                  example: http://order-service:8083
                methods:
                  type: array
                  items:
                    type: string
                  example: ["GET", "POST"]
                protected:
                  type: boolean
                  example: false
      responses:
        "201":
          description: Route created
    delete:
      summary: Delete a route
      tags: [Admin]
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Route deleted

  /admin/stats:
    get:
      summary: Get request statistics
      tags: [Admin]
      responses:
        "200":
          description: Aggregated request statistics per path
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    _id:
                      type: string
                      example: /api/users
                    total_requests:
                      type: integer
                      example: 150
                    avg_duration_ms:
                      type: number
                      example: 12.5

  /admin/keys:
    post:
      summary: Create a new API key
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: my-service-key
      responses:
        "201":
          description: API key created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKey"

  /admin/token:
    post:
      summary: Generate a JWT token
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, role]
              properties:
                user_id:
                  type: string
                  example: "1"
                role:
                  type: string
                  example: admin
      responses:
        "200":
          description: JWT token generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string

    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        price:
          type: number
        stock:
          type: integer

    Route:
      type: object
      properties:
        id:
          type: string
        path:
          type: string
        target:
          type: string
        methods:
          type: array
          items:
            type: string
        protected:
          type: boolean
        created_at:
          type: string
          format: date-time

    ApiKey:
      type: object
      properties:
        id:
          type: string
        key:
          type: string
        name:
          type: string
        active:
          type: boolean
        created_at:
          type: string
          format: date-time

  responses:
    RateLimitExceeded:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: rate limit exceeded
              retry_after:
                type: integer
                example: 60
      headers:
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer

    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: validation failed
              details:
                type: array
                items:
                  type: string
                example: ["field 'name' is required"]

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
