services:
  gateway:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - mongodb
      - redis
      - user-service
      - user-service-2
      - product-service
    environment:
      - CONFIG_PATH=configs/gateway.yaml

  # Two replicas of the same service so the gateway's round-robin load
  # balancing across the /api/users targets list is observable: each replica
  # stamps its own X-Instance header on every response.
  user-service:
    build: ./services/user-service
    ports:
      - "8081:8081"
    environment:
      - INSTANCE_ID=user-service-1

  user-service-2:
    build: ./services/user-service
    ports:
      - "8083:8081"
    environment:
      - INSTANCE_ID=user-service-2

  product-service:
    build: ./services/product-service
    ports:
      - "8082:8082"

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - gateway

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  mongo_data:
  prometheus_data:
  grafana_data:
