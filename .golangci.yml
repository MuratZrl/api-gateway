linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - goconst
    - misspell
    - unconvert
    - unparam

linters-settings:
  errcheck:
    check-blank: false
  goconst:
    min-len: 3
    min-occurrences: 3
  misspell:
    locale: US

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - unparam
  max-issues-per-linter: 50
  max-same-issues: 10

run:
  timeout: 5m
  tests: false
